# revision: "1-28-4"
name: istio-eastwestgateway
labels:
  istio: eastwestgateway
  app: istio-eastwestgateway
  topology.istio.io/network: network2
service:
  type: LoadBalancer
  ports:
    - name: status-port
      port: 15021
      targetPort: 15021
    - name: tls
      port: 15443
      targetPort: 15443
    - name: tls-istiod
      port: 15012
      targetPort: 15012
    - name: tls-webhook
      port: 15017
      targetPort: 15017
env:
  ISTIO_META_REQUESTED_NETWORK_VIEW: "network2"
